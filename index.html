<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DevTask Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2>🧠 DevTask</h2>
  </aside>

  <main class="main">

    <div class="topbar">
      <input id="taskInput" placeholder="Digite uma tarefa...">
      <button onclick="addTask()">+</button>
    </div>

    <div class="board">

      <div class="column" data-status="alta" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>🔥 Alta</h3>
        <div id="alta"></div>
      </div>

      <div class="column" data-status="media" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>⚠ Média</h3>
        <div id="media"></div>
      </div>

      <div class="column" data-status="baixa" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>🟢 Baixa</h3>
        <div id="baixa"></div>
      </div>

    </div>

  </main>

</div>

<script src="js/app.js"></script>
</body>
</html>
