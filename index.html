<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DevTask AI Pro</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="container">

  <h1>🧠 DevTask AI</h1>

  <!-- INPUT -->
  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Digite sua tarefa...">
    <button onclick="addTask()">Adicionar</button>
  </div>

  <!-- BUSCA -->
  <input type="text" id="search" placeholder="Buscar..." onkeyup="render()">

  <!-- FILTRO -->
  <select id="filter" onchange="render()">
    <option value="all">Todos</option>
    <option value="alta">Alta</option>
    <option value="media">Média</option>
    <option value="baixa">Baixa</option>
  </select>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div>🔥 Alta: <span id="alta"></span></div>
    <div>⚠ Média: <span id="media"></span></div>
    <div>🟢 Baixa: <span id="baixa"></span></div>
  </div>

  <!-- GRÁFICO -->
  <canvas id="grafico"></canvas>

  <!-- LISTA -->
  <div id="tasks"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
